services:
  # --- MEDIA SERVER ---
  plex:
    image: plexinc/pms-docker:latest
    container_name: plex
    env_file:
      - ./provision/.env.defaults
    environment:
      - TZ=Asia/Taipei
      - PLEX_UID=1000
      - PLEX_GID=1000
      - VERSION=docker
      - HOSTNAME="PlexServer"
    cap_add:
      - NET_ADMIN
    volumes:
      - ./provision/plex:/config
      - "${WIN_DATA_ROOT}/media/movies:/data/media/movies"
      - "${WIN_DATA_ROOT}/media/tv:/data/media/tv"
    ports:
      - "32400:32400/tcp" # Main Access
      - "1900:1900/udp" # DLNA
      - "32469:32469/tcp" # DLNA
      - "8324:8324/tcp" # Plex Companion
      - "32410:32410/udp" # GDM Discovery
      - "32412:32412/udp" # GDM Discovery
      - "32413:32413/udp" # GDM Discovery
      - "32414:32414/udp" # GDM Discovery
    restart: unless-stopped
    networks:
      - media-network

  # --- REQUESTS & DISCOVERY ---
  seerr:
    image: ghcr.io/seerr-team/seerr:latest
    container_name: seerr
    init: true
    env_file:
      - ./provision/.env.defaults
    environment:
      - PORT=5055
    volumes:
      - ./provision/overseerr:/app/config
    ports:
      - "10500:5055"
    restart: unless-stopped
    networks:
      - media-network

  # --- MEDIA MANAGEMENT (ARRs) ---
  radarr:
    image: lscr.io/linuxserver/radarr:latest
    container_name: radarr
    env_file:
      - ./provision/.env.defaults
    volumes:
      - ./provision/radarr:/config
      - "${WIN_DATA_ROOT}:/data"
    ports:
      - "10501:7878"
    restart: unless-stopped
    networks:
      - media-network

  sonarr:
    image: lscr.io/linuxserver/sonarr:latest
    container_name: sonarr
    env_file:
      - ./provision/.env.defaults
    volumes:
      - ./provision/sonarr:/config
      - "${WIN_DATA_ROOT}:/data"
    ports:
      - "10502:8989"
    restart: unless-stopped
    networks:
      - media-network

  prowlarr:
    image: lscr.io/linuxserver/prowlarr:latest
    container_name: prowlarr
    env_file:
      - ./provision/.env.defaults
    volumes:
      - ./provision/prowlarr:/config
    ports:
      - "10503:9696"
    restart: unless-stopped
    networks:
      - media-network

  # --- DOWNLOADS ---
  qbittorrent:
    image: lscr.io/linuxserver/qbittorrent:latest
    container_name: qbittorrent
    env_file:
      - ./provision/.env.defaults
    environment:
      - WEBUI_PORT=10504
    volumes:
      - ./provision/qbittorrent:/config
      - "${WIN_DATA_ROOT}:/data"
    ports:
      - "10504:10504"
      - "6881:6881"
      - "6881:6881/udp"
    restart: unless-stopped
    networks:
      - media-network

  # --- DASHBOARD & UTILS ---
  heimdall:
    image: lscr.io/linuxserver/heimdall:latest
    container_name: heimdall
    env_file:
      - ./provision/.env.defaults
    volumes:
      - ./provision/heimdall:/config
    ports:
      - "10505:80"
    restart: unless-stopped
    networks:
      - media-network

  # --- SEARCH HELPERS ---
  flaresolverr:
    image: ghcr.io/flaresolverr/flaresolverr:latest
    container_name: flaresolverr
    ports:
      - "10506:8191"
    restart: unless-stopped
    networks:
      - media-network

networks:
  media-network:
    name: media-network
